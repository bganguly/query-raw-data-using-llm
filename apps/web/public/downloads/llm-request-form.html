<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LLM Request Form</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #f5f7fb;
        color: #1b2530;
      }
      main {
        max-width: 900px;
        margin: 2rem auto;
        background: #fff;
        border: 1px solid #d9e1ec;
        border-radius: 12px;
        padding: 1.25rem;
      }
      h1 {
        margin-top: 0;
      }
      form {
        display: grid;
        gap: 0.75rem;
      }
      label {
        display: grid;
        gap: 0.35rem;
        font-size: 0.95rem;
      }
      input,
      select,
      textarea,
      button {
        font: inherit;
        padding: 0.6rem 0.75rem;
        border: 1px solid #c7d2e0;
        border-radius: 8px;
      }
      button {
        width: fit-content;
        background: #1246b9;
        color: #fff;
        border: none;
        cursor: pointer;
      }
      pre {
        background: #0f172a;
        color: #d2e5ff;
        padding: 0.85rem;
        border-radius: 8px;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .meta {
        color: #5c6a7a;
        font-size: 0.9rem;
      }
      .error {
        color: #a30d2a;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Plain HTML LLM Request Form</h1>
      <p class="meta">
        Use this fallback form to test provider calls directly from a simple HTML page.
      </p>
      <form id="llmForm">
        <label>
          Provider
          <select id="provider">
            <option value="openai">openai</option>
            <option value="anthropic">anthropic</option>
            <option value="openrouter">openrouter</option>
          </select>
        </label>
        <label>
          API Key
          <input id="apiKey" type="password" placeholder="Paste provider API key" required />
        </label>
        <label>
          Model
          <input id="model" type="text" value="gpt-4o-mini" required />
        </label>
        <label>
          Schema Prompt
          <textarea id="schema" rows="7" required>Table: s3://your-bucket/data/*.parquet
Columns: employer (string), year (int), wage (float), status (string), fiscal_year (int), fiscal_quarter (int)</textarea>
        </label>
        <label>
          User Query
          <textarea id="query" rows="3" required>average wage by job title</textarea>
        </label>
        <button type="submit">Generate SQL</button>
      </form>
      <h2>Response</h2>
      <pre id="output">Run the form to see SQL output.</pre>
      <p class="meta">
        If provider blocks browser CORS, route requests through a backend proxy.
      </p>
    </main>

    <script>
      const OPENAI_URL = 'https://api.openai.com/v1/chat/completions';
      const OPENROUTER_URL = 'https://openrouter.ai/api/v1/chat/completions';
      const ANTHROPIC_URL = 'https://api.anthropic.com/v1/messages';

      function makePrompt(schema, query) {
        return `You are a SQL expert. Given this schema:\n${schema}\n\nConvert this question to SQL (DuckDB syntax, reading from parquet on S3):\n"${query}"\n\nReturn ONLY the SQL query, nothing else.`;
      }

      function extractSql(text) {
        return text.replace(/```sql|```/gi, '').trim();
      }

      async function request(provider, apiKey, model, prompt) {
        if (provider === 'anthropic') {
          const response = await fetch(ANTHROPIC_URL, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'x-api-key': apiKey,
              'anthropic-version': '2023-06-01',
            },
            body: JSON.stringify({
              model,
              max_tokens: 512,
              temperature: 0,
              system: 'Return only a single read-only DuckDB SQL query.',
              messages: [{ role: 'user', content: prompt }],
            }),
          });

          if (!response.ok) {
            const errorText = await response.text();
            throw new Error(`Anthropic error ${response.status}: ${errorText}`);
          }

          const data = await response.json();
          const text = (data.content || [])
            .filter((part) => part.type === 'text')
            .map((part) => part.text || '')
            .join('\n');

          return extractSql(text || '');
        }

        const url = provider === 'openrouter' ? OPENROUTER_URL : OPENAI_URL;
        const headers = {
          'Content-Type': 'application/json',
          Authorization: `Bearer ${apiKey}`,
        };

        if (provider === 'openrouter') {
          headers['HTTP-Referer'] = 'http://localhost';
          headers['X-Title'] = 'Plain HTML LLM Request Form';
        }

        const response = await fetch(url, {
          method: 'POST',
          headers,
          body: JSON.stringify({
            model,
            temperature: 0,
            messages: [
              { role: 'system', content: 'Return only a single read-only DuckDB SQL query.' },
              { role: 'user', content: prompt },
            ],
          }),
        });

        if (!response.ok) {
          const errorText = await response.text();
          throw new Error(`${provider} error ${response.status}: ${errorText}`);
        }

        const data = await response.json();
        return extractSql(data?.choices?.[0]?.message?.content || '');
      }

      document.getElementById('llmForm').addEventListener('submit', async (event) => {
        event.preventDefault();

        const provider = document.getElementById('provider').value;
        const apiKey = document.getElementById('apiKey').value.trim();
        const model = document.getElementById('model').value.trim();
        const schema = document.getElementById('schema').value.trim();
        const query = document.getElementById('query').value.trim();
        const output = document.getElementById('output');

        output.textContent = 'Running...';
        output.classList.remove('error');

        try {
          const prompt = makePrompt(schema, query);
          const sql = await request(provider, apiKey, model, prompt);
          output.textContent = sql || 'No SQL output returned.';
        } catch (error) {
          output.textContent = error instanceof Error ? error.message : 'Request failed.';
          output.classList.add('error');
        }
      });
    </script>
  </body>
</html>
